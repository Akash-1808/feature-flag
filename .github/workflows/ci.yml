name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    name: Lint & Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build All Packages & Apps (includes Type Check)
        run: npm run build

      - name: Run Lint
        run: npm run lint --if-present

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: feature_flags
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/feature_flags
      REDIS_URL: redis://localhost:6379
      PORT: 3001
      BETTER_AUTH_SECRET: ci_test_secret_key_vanguard
      BETTER_AUTH_URL: http://localhost:3001
      NODE_ENV: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Packages (Required for tests)
        run: npm run build --workspace=flagcraft

      - name: Run Test Suites across Monorepo
        run: npm test

  docker-packaging:
    name: Verify Docker Builds
    runs-on: ubuntu-latest
    needs: [lint-and-build, test]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build API Docker Image
        run: docker build -f apps/api/Dockerfile -t vanguard-api:test .

      - name: Build Dashboard Docker Image
        run: docker build -f apps/dashboard/Dockerfile -t vanguard-dashboard:test .
